
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .container {
            width: 300px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px;
            width: 100%;
            background: #050b06;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #010302;
        }

        #mensagem {
            margin-top: 15px;
            font-weight: bold;
        }

        a {
            display: block;
            margin-top: 10px;
            color: #050b06;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Login</h2>

        <form id="formLogin">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="senha" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>

        <p id="mensagem"></p>

        <a href="cadastro.html">Cadastrar</a>
    </div>

    <script>
        document.getElementById("formLogin").addEventListener("submit", function (e) {
            e.preventDefault();

            fetch("http://localhost:5000/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email: document.getElementById("email").value,
                    senha: document.getElementById("senha").value
                })
            })
            .then(r => r.json())
            .then(d => document.getElementById("mensagem").innerText = d.mensagem)
            .catch(() => document.getElementById("mensagem").innerText = "Erro");
        });
    </script>

</body>
</html>
