<!DOCTYPE html>

<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Lista de Usuários</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .container {
            width: 700px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin: 0;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-add {
            background-color: #28a745;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            text-decoration: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #007BFF;
            color: white;
            padding: 10px;
            text-align: left;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        button {
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .edit {
            background-color: #ffc107;
            color: black;
        }

        .delete {
            background-color: #dc3545;
            color: white;
        }

        .btnLista {
            background-color: #28a745;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            text-decoration: none;
        }
    </style>


</head>

<body>

    <div class="container">
        <div class="top-bar">
            <h2>Usuários</h2>
            <a href="#" class="btn-add">+ Novo</a>
            <button id="btnLista" class="btnLista"> Listar</button>
        </div>


        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Email</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody id="tabelaUsuarios"></tbody>
        </table>


    </div>
    <script>
        document.getElementById("btnLista").addEventListener("click", function (e) {
            e.preventDefault();

            fetch("http://localhost:5000/usuarios", {
                //nao se cria body em metodo get
                method: "GET"
            })
                .then(function (res) {
                    return res.json();
                })
                .then(function (dados) {
                    console.log(dados);
                //como queremos listar usuarios do banco isto deve ser feito em formato de tabela
                    let tabela = document.getElementById("tabelaUsuarios");
                    tabela.innerHTML = "";

                    dados.forEach(function (usuario) {
                   //puxando estrutura de tabela que ja existe e referenciando os campos com
                   //${.....}
                   tabela.innerHTML = "";
                        dados.forEach(function (usuario) {
                            tabela.innerHTML += `
                    <tr>
                        <td>${usuario.id}</td>
                        <td>${usuario.email}</td>
                        <td>
                            <button onclick="excluir(${usuario.id})">
                                Excluir
                            </button>
                        </td>
                    </tr>
                `;
                        });
                    })
                })
                .catch(function (erro) {
                    console.error(erro);
                    alert('Erro ao listar');
                });
        });
    </script>

</body>

</html>
